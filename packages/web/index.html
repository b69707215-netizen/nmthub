<!doctype html>
<html lang="uk">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" href="/favicon.ico" />
		<title>Нмтхаб — підготовка к НМТ</title>
		<meta name="description" content="Нмтхаб підготовка к НМТ: тести по предметах, пробні завдання та запис на заняття онлайн." />
		<meta property="og:title" content="Нмтхаб — підготовка к НМТ" />
		<meta property="og:description" content="Нмтхаб підготовка к НМТ: тести по предметах, пробні завдання та запис на заняття онлайн." />
		<meta property="og:url" content="https://add.nmthub.online/" />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Нмтхаб — підготовка к НМТ" />
		<meta name="twitter:description" content="Нмтхаб підготовка к НМТ: тести по предметах, пробні завдання та запис на заняття онлайн." />
	</head>
	<body>
		<div id="root"></div>
		<script>
			document.addEventListener("click", function (event) {
				var button = event.target.closest && event.target.closest(".price button");
				if (!button) return;
				var card = button.closest(".price");
				var subject = card && card.querySelector("h3") ? card.querySelector("h3").textContent : "Курс";
				var score = card && card.querySelector("strong") ? card.querySelector("strong").textContent : "";
				fetch("/api/lead", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ type: "Оплата курсу", name: "Клік по оплаті", phone: "", subject: subject, score: score })
				}).catch(function () {});
			}, true);
		</script>
		<script type="module" src="/src/web/main.tsx"></script>
	</body>
</html>
